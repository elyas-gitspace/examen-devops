name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Je récupère mon code local
        uses: actions/checkout@v4

      - name: j'installe Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: j'installe les dépendances
        run: npm install

      - name: lancement des tests
        run: npm test

      - name: déploiement
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "Déploiement en cours..."
